<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Data Analytics Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
  <aside class="sidebar">
    <h2>AI Analytics</h2>
    <a class="active" href="index.html">Dashboard</a>
    <a href="profile.html">Profile</a>
    <a href="dashboard.html">Admin</a>
    <a href="login.html">Login</a>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <h1>AI Data Analytics Dashboard</h1>
        <p>Level 1 to 6 upgraded project</p>
      </div>
      <button id="themeBtn">Dark / Light</button>
    </header>

    <section class="cards">
      <div class="card"><span>Total Records</span><h3 id="totalRecords">0</h3></div>
      <div class="card"><span>Total Sales</span><h3 id="totalSales">₹0</h3></div>
      <div class="card"><span>Avg Score</span><h3 id="avgScore">0%</h3></div>
      <div class="card"><span>AI Risk</span><h3 id="riskLevel">Low</h3></div>
    </section>

    <section class="panel">
      <h2>Add Data</h2>
      <div class="form-grid">
        <input id="name" placeholder="Name / Product" />
        <input id="value" type="number" placeholder="Value / Sales" />
        <input id="score" type="number" placeholder="Score %" />
        <button onclick="addData()">Add</button>
      </div>
      <div class="actions">
        <input type="file" id="csvInput" accept=".csv" />
        <button onclick="exportPDF()">Export PDF</button>
        <button onclick="exportExcel()">Export Excel</button>
        <button onclick="generateAIReport()">AI Report</button>
      </div>
    </section>

    <section class="charts">
      <div class="chart-card"><canvas id="barChart"></canvas></div>
      <div class="chart-card"><canvas id="lineChart"></canvas></div>
      <div class="chart-card"><canvas id="pieChart"></canvas></div>
    </section>

    <section class="panel ai-box">
      <h2>AI Insights</h2>
      <p id="aiInsight">Add data or import CSV to generate AI insights.</p>
      <textarea id="question" placeholder="Ask: Which product is highest?"></textarea>
      <button onclick="askAI()">Ask AI</button>
      <p id="aiAnswer"></p>
    </section>

    <section class="panel">
      <h2>Data Table</h2>
      <input id="search" placeholder="Search data..." oninput="renderTable()" />
      <table>
        <thead><tr><th>Name</th><th>Value</th><th>Score</th><th>Status</th></tr></thead>
        <tbody id="dataBody"></tbody>
      </table>
    </section>
  </main>

  <script src="firebase-config.js"></script>
  <script src="ai.js"></script>
  <script src="export.js"></script>
  <script src="app.js"></script>
</body>
</html>
